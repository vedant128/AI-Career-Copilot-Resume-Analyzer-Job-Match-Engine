<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- outer hex -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="#111a12" stroke="#22C55E" stroke-width="1.2"/>
  <!-- inner hex -->
  <polygon points="16,7 24,11.5 24,20.5 16,25 8,20.5 8,11.5" fill="none" stroke="#22C55E" stroke-width="0.6" opacity="0.4"/>
  <!-- X arms -->
  <line x1="10" y1="10" x2="22" y2="22" stroke="#22C55E" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="22" y1="10" x2="10" y2="22" stroke="#22C55E" stroke-width="2.2" stroke-linecap="round"/>
  <!-- corner dots -->
  <circle cx="10" cy="10" r="2" fill="#22C55E"/>
  <circle cx="22" cy="10" r="2" fill="#22C55E"/>
  <circle cx="10" cy="22" r="2" fill="#22C55E"/>
  <circle cx="22" cy="22" r="2" fill="#22C55E"/>
  <!-- center ring -->
  <circle cx="16" cy="16" r="2.5" fill="#111a12" stroke="#22C55E" stroke-width="1.2"/>
  <!-- hex tip connectors -->
  <line x1="4" y1="16" x2="8" y2="16" stroke="#22C55E" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="16" x2="28" y2="16" stroke="#22C55E" stroke-width="0.8" opacity="0.5"/>
  <circle cx="4" cy="16" r="1.2" fill="#22C55E" opacity="0.6"/>
  <circle cx="28" cy="16" r="1.2" fill="#22C55E" opacity="0.6"/>
  <circle cx="16" cy="2" r="1.2" fill="#22C55E" opacity="0.6"/>
  <circle cx="16" cy="30" r="1.2" fill="#22C55E" opacity="0.6"/>
</svg>
